services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - .:/app          # ← 加這行
    environment:
      FLASK_ENV: development    # ← 改這行
      SECRET_KEY: thisisasupersecretkey
      DATABASE_URL: postgresql://yohoot:password@db:5432/yohoot
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: yohoot
      POSTGRES_PASSWORD: password
      POSTGRES_DB: yohoot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yohoot"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  postgres_data:
