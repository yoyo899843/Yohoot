{% extends "base.html" %}
{% block title %}登入 — Yohoot{% endblock %}

{% block content %}
<div style="max-width:400px;margin:60px auto;">
  <div class="card">
    <h2 style="text-align:center;margin-bottom:24px;color:#46178f;">主持人登入</h2>

    <form method="POST">
      <div class="form-group">
        <label>用戶名</label>
        <input class="form-control" type="text" name="username" autofocus required>
      </div>
      <div class="form-group">
        <label>密碼</label>
        <input class="form-control" type="password" name="password" required>
      </div>
      <button class="btn btn-primary btn-block" type="submit">登入</button>
    </form>

    <p style="text-align:center;margin-top:16px;color:#666;">
      還沒有帳號？<a href="{{ url_for('auth.register') }}" style="color:#46178f;">立即註冊</a>
    </p>
  </div>
</div>
{% endblock %}
