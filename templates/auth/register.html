{% extends "base.html" %}
{% block title %}註冊 — Yohoot{% endblock %}

{% block content %}
<div style="max-width:400px;margin:60px auto;">
  <div class="card">
    <h2 style="text-align:center;margin-bottom:24px;color:#46178f;">建立主持人帳號</h2>

    <form method="POST">
      <div class="form-group">
        <label>用戶名</label>
        <input class="form-control" type="text" name="username" autofocus required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input class="form-control" type="email" name="email" required>
      </div>
      <div class="form-group">
        <label>密碼</label>
        <input class="form-control" type="password" name="password" required minlength="6">
      </div>
      <button class="btn btn-primary btn-block" type="submit">建立帳號</button>
    </form>

    <p style="text-align:center;margin-top:16px;color:#666;">
      已有帳號？<a href="{{ url_for('auth.login') }}" style="color:#46178f;">登入</a>
    </p>
  </div>
</div>
{% endblock %}
